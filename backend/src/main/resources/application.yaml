spring:
  application:
    name: whitewall

  profiles:
    active: dev

  datasource:
    url: ${WHITEWALL_DB_URL:jdbc:postgresql://localhost:5432/whitewall}
    username: ${WHITEWALL_DB_USER:whitewall}
    password: ${WHITEWALL_DB_PASSWORD:whitewall}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: America/Cuiaba

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  thymeleaf:
    cache: false

server:
  port: ${WHITEWALL_SERVER_PORT:8080}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    br.com.whitewall: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

whitewall:
  app:
    name: Whitewall
    description: Sistema web para controle, governança e auditoria de acessos externos de Inteligencia Artificial.
    version: 0.1.0

  security:
    default-admin-email: ${WHITEWALL_ADMIN_EMAIL:admin@whitewall.local}
    password-strength: 10

  audit:
    enabled: true
    retention-days: 180

  document-analysis:
    enabled: true
    max-file-size-mb: 10
    store-original-file: false
    allowed-file-types:
        - pdf
        - docx
        - txt
        - java
        - json
        - yaml
    blocked-file-types:
        - exe
        - bat
        - sh
        - zip
        - rar

  access-control:
    default-decision: PENDING_APPROVAL
    block-sensitive-data: true
    sensitive-patterns:
      - CPF
      - CNPJ
      - EMAIL
      - PHONE
      - PASSWORD
      - TOKEN
      - API_KEY
      - INTERNAL_DOCUMENT